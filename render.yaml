services:
  # Backend API
  - type: web
    name: dharmagpt-api
    runtime: python
    plan: free
    repo: https://github.com/aksri648/DharmaGPT
    branch: master
    buildCommand: pip install -e .
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health
    envVars:
      # Database (Neon DB — set manually in Render dashboard)
      - key: DATABASE_URL
        sync: false

      # LLM (placeholder — update with real values)
      - key: LLM_MODEL
        value: qwen3:8b
      - key: LLM_BASE_URL
        value: http://localhost:11434/v1
      - key: LLM_API_KEY
        value: ""

      # Embeddings (uses OpenAI-compatible API)
      - key: EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: EMBEDDING_DIMENSIONS
        value: "1536"

      # Collections
      - key: PGVECTOR_COLLECTION_GITA
        value: dharma_gita
      - key: PGVECTOR_COLLECTION_RAMAYANA
        value: dharma_ramayana
      - key: PGVECTOR_COLLECTION_STORIES
        value: dharma_stories

      # Retrieval
      - key: RETRIEVER_K
        value: "5"
      - key: RETRIEVER_SCORE_THRESHOLD
        value: "0.5"
      - key: HYBRID_BM25_K
        value: "10"
      - key: RRF_K
        value: "60"

      # Graph
      - key: MAX_SELECTED_VERSES
        value: "3"
      - key: MAX_SELECTED_STORIES
        value: "2"
      - key: GRAPH_RECURSION_LIMIT
        value: "25"

      # API
      - key: API_PREFIX
        value: /api/v1
      - key: CORS_ORIGINS
        value: '["*"]'
      - key: CHAT_MESSAGE_MAX_LENGTH
        value: "2000"

      # App
      - key: APP_HOST
        value: 0.0.0.0
      - key: APP_PORT
        value: "8000"
      - key: LOG_LEVEL
        value: info

  # Frontend (static site)
  - type: static_site
    name: dharmagpt-frontend
    runtime: static
    plan: free
    repo: https://github.com/aksri648/DharmaGPT
    branch: master
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: /api
